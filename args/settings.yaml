memory:
  auto_save: true
  importance_threshold: 3
  max_log_entries_per_day: 100
  retention_days: 90
  working_tier_max_chars: 5000
  episodic_expiry_days: 90
  pinned_min_importance: 10
  curator:
    enabled: true
    expire_db_min_importance: 5
    consolidation_threshold: 0.85
    expire_types:
      - interaction
      - general
      - event

search:
  query_expansion:
    enabled: true
  temporal_decay:
    enabled: true
    half_life_days: 30
    evergreen_min_importance: 9
  mmr:
    enabled: true
    lambda: 0.7

session:
  load_memory_on_start: true
  save_memory_on_end: true
  max_context_tokens: 100000
  context_budget:
    system_prompt: 0.10
    daily_logs: 0.02
    retrieved_memories: 0.02
    history: 0.30
    reserved_for_response: 0.05
    tier1_max_tokens: 4000
    tier2_max_tokens: 4000
    tier3_max_tokens: 8000
    total_max_tokens: 16000
  end_of_session_summary: true
  min_messages_for_summary: 4

models:
  chat:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 4096
    temperature: 0.7
  drafting:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 2048
    temperature: 0.6
  memory_extraction:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 1024
    temperature: 0.2

cost_caps:
  alerts:
    per_run_usd: 3
    per_day_usd: 8
  hard_stop:
    per_day_usd: 15

output:
  verbose: false
  show_timestamps: true
  format: markdown

knowledge:
  sources:
    - path: ~/Desktop/AITourPilot Project/BUSINESS_CONTENT/wiki
      glob: "**/*.html"
      extractor: html_wiki
      access: read
      label: "Business Wiki"
    - path: ~/Desktop/AITourPilot Project/Marketing Automation
      glob: "**/*.{txt,md,pdf,docx}"
      extractor: auto
      access: read
      label: "Marketing Materials"
      exclude_patterns:
        - "*.png"
        - "*.jpg"
        - "*.jpeg"
        - "*.gif"
        - "*.svg"
        - ".git/**"
        - "*.csv"
        - "*.xlsx"
    - path: ./docs_dev
      glob: "**/*.md"
      extractor: md
      access: readwrite
      label: "Development Docs"
  output_dir: knowledge/processed
  max_file_size_mb: 10

calendar:
  enabled: true
  google:
    enabled: true
    token_file: "~/.touribot/google_token.json"
    scopes:
      - "https://www.googleapis.com/auth/calendar"

deep_research:
  search_provider: tavily   # tavily | serper
  presets:
    quick:
      max_queries: 5
      max_pages: 5
      max_gap_iterations: 1
    standard:
      max_queries: 10
      max_pages: 10
      max_gap_iterations: 2
    deep:
      max_queries: 20
      max_pages: 20
      max_gap_iterations: 4
